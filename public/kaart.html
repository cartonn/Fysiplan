<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="color-scheme" content="light"/>
<meta name="robots" content="noindex"/>
<title>Trainingskaart — Fysiplan</title>
<style>
  :root{
    --blauw:#2456a6; --blauw-d:#1c4487; --inkt:#232019; --tekst:#3d3a31; --grijs:#777162;
    --bg:#f6f2e9; --vlak:#fffefa; --lijn:#e7e0cf;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:16px/1.55 Charter,Georgia,'Times New Roman',serif;background:var(--bg);color:var(--tekst)}
  h1,h2,.tag,.shw{font-family:'Avenir Next',Seravek,'Segoe UI',system-ui,sans-serif}
  .wrap{max-width:720px;margin:0 auto;padding:20px 16px 60px}
  .kop{background:var(--vlak);border:1px solid var(--lijn);border-radius:16px;padding:20px;box-shadow:0 6px 22px rgba(80,64,32,.09)}
  .kop img.logo{max-height:44px;max-width:190px;object-fit:contain;display:block;margin-bottom:8px}
  .kop h1{font-size:22px;color:var(--blauw);letter-spacing:-.01em}
  .kop .adres{font-size:13.5px;color:var(--grijs);margin-top:4px}
  .tag{display:inline-block;background:#edf2fa;color:var(--blauw);font-size:12px;font-weight:600;
    padding:3px 10px;border-radius:999px;margin-bottom:10px;letter-spacing:.02em}
  .clientblok{margin:14px 0 0;padding-top:12px;border-top:1px solid var(--lijn);font-size:15px}
  .clientblok b{color:var(--inkt)}
  .clientblok .veld{margin-top:2px}
  .oef{display:flex;gap:14px;align-items:center;background:var(--vlak);border:1px solid var(--lijn);
    border-radius:14px;padding:12px 14px;margin-top:10px;box-shadow:0 1px 2px rgba(80,64,32,.05)}
  .oef .nr{flex:0 0 28px;height:28px;border-radius:999px;background:var(--blauw);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;
    font-family:'Avenir Next',Seravek,'Segoe UI',system-ui,sans-serif}
  .oef img{width:84px;height:84px;object-fit:contain;background:#fff;border:1px solid var(--lijn);border-radius:10px;flex:0 0 84px}
  .oef .naam{font-size:16.5px;color:var(--inkt);font-weight:700}
  .oef .shw{font-size:13px;color:var(--grijs);margin-top:3px}
  .vbtn{display:inline-flex;align-items:center;gap:6px;margin-top:7px;font:600 13px/1 'Avenir Next',Seravek,'Segoe UI',system-ui,sans-serif;
    color:var(--blauw);background:#edf2fa;border:1px solid #d9e4f5;border-radius:999px;padding:7px 13px;cursor:pointer}
  .vbtn.eigen{background:var(--blauw);color:#fff;border-color:var(--blauw)}
  .vhouder{margin:10px -14px -12px;border-radius:0 0 14px 14px;overflow:hidden;background:#000}
  .vhouder video,.vhouder iframe{display:block;width:100%;aspect-ratio:16/10;border:none;background:#000}
  .oefwrap{margin-top:10px}
  h2{font-size:17px;color:var(--inkt);margin:26px 0 4px}
  .schemawrap{overflow-x:auto;background:var(--vlak);border:1px solid var(--lijn);border-radius:14px;margin-top:8px}
  table{border-collapse:collapse;font-size:12.5px;min-width:100%}
  th,td{border:1px solid var(--lijn);padding:5px 7px;text-align:center;white-space:nowrap}
  th{background:#fbf8f0;color:var(--grijs);font-weight:600}
  td.dat{background:#fbf8f0;font-weight:700;color:var(--inkt)}
  .voet{margin-top:34px;text-align:center;font-size:13px;color:var(--grijs)}
  .voet a{color:var(--blauw)}
  .fout{background:var(--vlak);border:1px solid var(--lijn);border-radius:16px;padding:28px;text-align:center;margin-top:30vh}
  @media print{
    body{background:#fff}
    .wrap{max-width:none;padding:0}
    .kop,.oef,.schemawrap{box-shadow:none}
  }
</style>
</head>
<body>
<div class="wrap" id="wrap" style="display:none">
  <div class="kop">
    <span class="tag">Trainingskaart</span>
    <img class="logo" id="logo" alt="" style="display:none"/>
    <h1 id="prak"></h1>
    <div class="adres" id="adres"></div>
    <div class="clientblok" id="clientblok" style="display:none"></div>
  </div>
  <h2 id="oefkop">Jouw oefeningen</h2>
  <div id="oefs"></div>
  <div id="schema"></div>
  <div class="voet">Deze kaart is gemaakt door je fysiotherapeut met <a href="https://fysiplan.nl/v2">Fysiplan</a>.<br/>
    Vragen over de uitvoering? Neem contact op met je praktijk.</div>
</div>
<div class="fout" id="fout" style="display:none">
  <h1 style="font-size:20px;color:var(--inkt);margin-bottom:8px">Kaart niet gevonden</h1>
  Deze trainingskaart bestaat niet (meer). Vraag je fysiotherapeut om een nieuwe QR-code.
</div>
<script>
(function(){
  'use strict';
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
  function normEx(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'');}
  var id=(location.pathname.match(/^\/k\/([a-f0-9]{8,16})$/)||[])[1];
  function toon(kaart,praktijk,lib){
    var byNorm={};(lib||[]).forEach(function(o){byNorm[normEx(o.naam)]=o;});
    document.title='Trainingskaart — '+(praktijk.praktijk||'Fysiplan');
    if(praktijk.logo){var lg=document.getElementById('logo');lg.src='/'+praktijk.logo;lg.style.display='block';}
    document.getElementById('prak').textContent=praktijk.praktijk||kaart.praktijk;
    document.getElementById('adres').textContent=[praktijk.adres,praktijk.plaats,praktijk.tel].filter(Boolean).join(' · ');
    var cl=kaart.client||{};
    var regels=[];
    if(cl.c_naam)regels.push('<div class="veld"><b>Voor:</b> '+esc(cl.c_naam)+'</div>');
    if(cl.c_doel)regels.push('<div class="veld"><b>Doel:</b> '+esc(cl.c_doel)+'</div>');
    if(cl.c_opm)regels.push('<div class="veld"><b>Opmerking:</b> '+esc(cl.c_opm)+'</div>');
    if(regels.length){var cb=document.getElementById('clientblok');cb.innerHTML=regels.join('');cb.style.display='block';}
    // oefeningen met plaatjes uit de bibliotheek; S/H/W uit de eerst ingevulde rij van het schema
    var cells=kaart.cells||{};
    var vids=kaart.vids||{};
    var html='';
    (kaart.chosen||[]).forEach(function(x,idx){
      var nk=normEx(x.n);
      var o=byNorm[nk];
      var key='n'+nk+'.'+(x.i||0);
      var voorschrift='';
      for(var r=0;r<12;r++){
        var s=cells[key+'|r'+r+'|S'],h=cells[key+'|r'+r+'|H'],w=cells[key+'|r'+r+'|W'];
        if(s||h||w){
          voorschrift=[s?s+' series':'',h?h+' herhalingen':'',w?w:''].filter(Boolean).join(' · ');
          break;
        }
      }
      // videovoorrang: persoonlijke opname van de therapeut > praktijkopname > YouTube-link
      var eigen=vids[nk]||(o&&o.video&&o.video.eigen)||null;
      var yt=(!eigen&&o&&o.video&&o.video.yt)||null;
      var knop='';
      if(eigen)knop='<button class="vbtn eigen" data-eigen="/'+esc(eigen)+'">&#9654; Video van je therapeut</button>';
      else if(yt)knop='<button class="vbtn" data-yt="'+esc(yt)+'">&#9654; Bekijk instructievideo</button>';
      html+='<div class="oef" style="flex-wrap:wrap"><span class="nr">'+(idx+1)+'</span>'+
        (o?'<img src="/'+esc(o.img)+'" alt=""/>':'')+
        '<div style="flex:1;min-width:0"><div class="naam">'+esc(x.n)+'</div>'+
        (voorschrift?'<div class="shw">'+esc(voorschrift)+'</div>':'')+knop+'</div>'+
        '<div class="vhouder" style="display:none;flex-basis:100%"></div></div>';
    });
    document.getElementById('oefs').innerHTML=html||'<div class="oef">Er staan nog geen oefeningen op deze kaart.</div>';
    // video pas laden bij een tik op de knop (spaart data, en YouTube laadt privacyvriendelijk)
    document.getElementById('oefs').addEventListener('click',function(e){
      var b=e.target.closest('.vbtn');if(!b)return;
      var houder=b.closest('.oef').querySelector('.vhouder');
      if(houder.style.display!=='none'){houder.style.display='none';houder.innerHTML='';return;}
      if(b.dataset.eigen){
        houder.innerHTML='<video controls autoplay playsinline preload="metadata" src="'+b.dataset.eigen+'"></video>';
      }else{
        houder.innerHTML='<iframe src="https://www.youtube-nocookie.com/embed/'+b.dataset.yt+
          '?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>';
      }
      houder.style.display='block';
    });
    // volledig schema alleen tonen als er iets is ingevuld
    var rowdefs=[];
    for(var r2=0;r2<12;r2++)rowdefs.push('r'+r2);
    var gevuld=rowdefs.filter(function(rk){
      return (kaart.rows&&kaart.rows[rk])||(kaart.chosen||[]).some(function(x){
        var key='n'+normEx(x.n)+'.'+(x.i||0);
        return ['S','H','W'].some(function(f){return cells[key+'|'+rk+'|'+f];});
      });
    });
    if(gevuld.length){
      var t='<h2>Schema</h2><div class="schemawrap"><table><tr><th>Datum</th>';
      (kaart.chosen||[]).forEach(function(x,idx){t+='<th colspan="3">'+(idx+1)+'. '+esc(x.n)+'</th>';});
      t+='</tr><tr><th></th>';
      (kaart.chosen||[]).forEach(function(){t+='<th>S</th><th>H</th><th>W</th>';});
      t+='</tr>';
      gevuld.forEach(function(rk){
        t+='<tr><td class="dat">'+esc((kaart.rows&&kaart.rows[rk])||'')+'</td>';
        (kaart.chosen||[]).forEach(function(x){
          var key='n'+normEx(x.n)+'.'+(x.i||0);
          ['S','H','W'].forEach(function(f){t+='<td>'+esc(cells[key+'|'+rk+'|'+f]||'')+'</td>';});
        });
        t+='</tr>';
      });
      t+='</table></div>';
      document.getElementById('schema').innerHTML=t;
    }
    document.getElementById('wrap').style.display='block';
  }
  if(!id){document.getElementById('fout').style.display='block';}
  else{
    Promise.all([
      fetch('/api/kaart?id='+id,{cache:'no-cache'}).then(function(r){return r.json();}),
      fetch('/oefeningen.json',{cache:'no-cache'}).then(function(r){return r.ok?r.json():[];}).catch(function(){return [];})
    ]).then(function(res){
      if(!res[0]||!res[0].ok){document.getElementById('fout').style.display='block';return;}
      toon(res[0].kaart,res[0].praktijk||{},res[1]);
    }).catch(function(){document.getElementById('fout').style.display='block';});
  }
})();
</script>
</body>
</html>
